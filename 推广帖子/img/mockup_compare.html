<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>自己搞 vs 找我装</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
.wrapper { max-width: 720px; width: 100%; }
.title { text-align: center; color: white; font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
.table-container { display: flex; gap: 0; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.column { flex: 1; }
.column-header { padding: 20px; text-align: center; font-size: 20px; font-weight: 700; }
.column-left .column-header { background: #2d2d44; color: #ff6b6b; }
.column-right .column-header { background: #0a5c36; color: #51cf66; }
.column-right { position: relative; }
.column-right::before { content: ''; position: absolute; left: -3px; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, #ff6b6b, #51cf66); }
.row { display: flex; align-items: center; padding: 16px 20px; gap: 12px; min-height: 56px; }
.column-left .row { background: #252540; }
.column-right .row { background: #0e4a2e; }
.row:nth-child(even) .column-left & { background: #2d2d44; }
.row:nth-child(even) .column-right & { background: #0f5533; }
.row-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.row-text { font-size: 15px; color: #ddd; line-height: 1.4; }
.column-left .row-text { color: #aaa; }
.column-right .row-text { color: #c8f7d5; font-weight: 500; }
.divider { height: 1px; background: rgba(255,255,255,0.05); }

/* 对比行配对 */
.compare-row { display: flex; }
.compare-row .column { flex: 1; }
.compare-row .row { min-height: 52px; }

.footer { text-align: center; margin-top: 24px; color: #666; font-size: 12px; }
.tag { display: inline-block; background: #e74c3c; color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
.tag-green { background: #2ecc71; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="title">自己搞 vs 找我装</div>
  <div class="subtitle">一个真实的选择摆在你面前</div>

  <div class="table-container">
    <!-- 左列：自己搞 -->
    <div class="column column-left">
      <div class="column-header">😤 自己搞</div>
      <div class="row">
        <span class="row-icon">📚</span>
        <span class="row-text">需要技术基础<br><small style="color:#666">Linux/网络/脚本都得会</small></span>
      </div>
      <div class="row">
        <span class="row-icon">⏰</span>
        <span class="row-text">花一周时间<br><small style="color:#666">还不一定能搞定</small></span>
      </div>
      <div class="row">
        <span class="row-icon">🕳️</span>
        <span class="row-text">踩 9+ 个坑<br><small style="color:#666">每个坑都可能卡你一天</small></span>
      </div>
      <div class="row">
        <span class="row-icon">❓</span>
        <span class="row-text">可能搞不定<br><small style="color:#666">变砖风险自己承担</small></span>
      </div>
      <div class="row">
        <span class="row-icon">🚫</span>
        <span class="row-text">没有售后<br><small style="color:#666">出问题自己想办法</small></span>
      </div>
      <div class="row">
        <span class="row-icon">💸</span>
        <span class="row-text">看似省钱<br><small style="color:#666">时间成本远超想象</small></span>
      </div>
    </div>

    <!-- 右列：找我装 -->
    <div class="column column-right">
      <div class="column-header">😎 找我装 <span class="tag tag-green">推荐</span></div>
      <div class="row">
        <span class="row-icon">✅</span>
        <span class="row-text">不需要任何技术<br><small style="color:#6aaF80">插电就能用</small></span>
      </div>
      <div class="row">
        <span class="row-icon">⚡</span>
        <span class="row-text">半天搞定<br><small style="color:#6aaF80">到手即用，不用折腾</small></span>
      </div>
      <div class="row">
        <span class="row-icon">🛡️</span>
        <span class="row-text">坑都踩过了<br><small style="color:#6aaF80">9 个坑全部已修复</small></span>
      </div>
      <div class="row">
        <span class="row-icon">💯</span>
        <span class="row-text">保证能用<br><small style="color:#6aaF80">100% 成功率验证</small></span>
      </div>
      <div class="row">
        <span class="row-icon">🤝</span>
        <span class="row-text">包售后<br><small style="color:#6aaF80">出问题随时找我</small></span>
      </div>
      <div class="row">
        <span class="row-icon">🎯</span>
        <span class="row-text">真正省钱<br><small style="color:#6aaF80">一次投入，长期受益</small></span>
      </div>
    </div>
  </div>

  <div class="footer">你的时间值多少钱？花一周折腾，还是半天搞定？</div>
</div>

</body>
</html>
